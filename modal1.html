<!-- modal1.html -->
<!DOCTYPE html>
<div class="m1-root">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <style>
    /* === PALETTE & ROOT === */
    :root {
      --bg-primary: #f8f9fa;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --accent: #000000;
      --accent-hover: #333333;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --tab-bg: #e8e8e8;
      --tab-active: #ffffff;
    }

    .m1-root {
      display: flex; flex-direction: column; height: 100%; width: 100%;
      position: relative; background: var(--bg-card); font-family: 'SN Pro', sans-serif; overflow: hidden;
    }

    /* === HEADER & MAIN TABS (Auth Style) === */
    .m1-header {
      display: flex; justify-content: space-between; align-items: center;
      height: 56px; min-height: 56px; border-bottom: 1px solid var(--border-color);
      padding: 0 20px; background: var(--bg-card); z-index: 10;
    }
    .m1-header-title { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; color: var(--text-primary); text-transform: uppercase; }
    
    /* Main Tab Switcher */
    .tab-container { position: relative; display: flex; flex-direction: row; align-items: flex-start; padding: 2px; background-color: var(--tab-bg); border-radius: 10px; }
    .tab-container .indicator { width: 50%; height: 36px; background: var(--tab-active); position: absolute; top: 2px; left: 2px; z-index: 9; border: 0.5px solid rgba(0, 0, 0, 0.04); box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.12); border-radius: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .tab-container .m1-tab-input { width: 50%; height: 36px; position: absolute; z-index: 99; outline: none; opacity: 0; cursor: pointer; }
    .tab-container .m1-tab-label { width: 50%; height: 36px; position: relative; z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: color 0.3s ease; }
    .tab-container .m1-tab-input:checked + .m1-tab-label { color: var(--text-primary); }
    /* Move indicator for second tab */
    #m1-tab2:checked ~ .indicator { left: 50%; }

    .m1-page { display: none; flex-direction: column; flex: 1; height: calc(100% - 56px); position: relative; }
    .m1-page.active { display: flex; }

    /* === COMMON LAYOUT PARTS === */
    .m1-top-section { height: 100px; min-height: 100px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); background: var(--bg-card); }
    .m1-bottom-section { flex: 1; position: relative; }
    .modal9-scroll-wrapper { position: absolute; top: 0; left: 0; bottom: 0; width: calc(100% + 30px); overflow: visible; pointer-events: auto; z-index: 1; }
    .modal9-window { height: 100%; width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.6); padding: 20px; padding-right: 10px; }
    .modal9-content { height: 100%; width: 100%; overflow-y: scroll; overflow-x: hidden; padding-right: 20px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
    .modal9-content::-webkit-scrollbar { width: 6px; }
    .modal9-content::-webkit-scrollbar-track { background: transparent; }
    .modal9-content::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }

    /* === BUTTONS === */
    .m1-action-btn {
      padding: 12px 24px; background: var(--accent); color: white; border: none;
      border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, opacity 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .m1-action-btn:hover { background: var(--accent-hover); }
    .m1-action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .m1-action-btn .loader { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    .m1-action-btn.loading .loader { display: block; }
    .m1-action-btn.loading .btn-text { display: none; }
    
    .btn-cancel { padding: 10px 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 10px; font-weight: 500; cursor: pointer; }
    .btn-submit { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; min-width: 120px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-submit .loader { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    .btn-submit.loading .loader { display: block; }
    .btn-submit.loading .btn-text { display: none; }

    /* === SUBPAGE 1 (MANAGER) CARDS === */
    .orders-list { display: flex; flex-direction: column; gap: 20px; width: 100%; }
    
    .order-card {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px;
      padding: 20px; width: 100%; box-sizing: border-box;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: box-shadow 0.3s ease;
    }
    .order-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); }
    
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); gap: 16px; flex-wrap: wrap;
    }
    .client-info { display: flex; flex-direction: row; align-items: center; gap: 24px; flex: 1; }
    .client-org { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .client-org span { color: var(--text-muted); font-weight: 400; margin-right: 4px; }
    .client-inn { font-size: 14px; color: var(--text-secondary); }
    .client-inn span { color: var(--text-muted); margin-right: 4px; }
    
    .order-number-badge {
      background: var(--bg-primary); padding: 6px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 600; color: var(--text-secondary); border: 1px solid var(--border-color); white-space: nowrap;
    }

    .card-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 14px; }
    .row-label { color: var(--text-muted); flex-shrink: 0; min-width: 140px; }
    .row-value { color: var(--text-primary); font-weight: 500; }

    .platforms-container { margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 12px; }
    .platform-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
    .platform-name { width: 120px; font-weight: 600; color: var(--text-primary); }
    .platform-stats { display: flex; gap: 16px; color: var(--text-secondary); font-size: 13px; }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-count { font-weight: 600; color: var(--text-primary); }

    /* === SUBPAGE 2 (AUTHOR) STYLES === */
    /* Inner Tab Switcher */
    .view-header { display: flex; justify-content: flex-end; margin-bottom: 24px; }
    .view-header .tab-container { transform: scale(0.9); } /* Slightly smaller for inner content */
    
    .action-block { margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    
    .action-btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-flex; align-items: center; justify-content: center; min-width: 140px; height: 40px; }
    .action-btn.primary { background: var(--accent); color: white; }
    .action-btn.primary:hover { background: var(--accent-hover); }
    .action-btn.secondary { background: var(--success); color: white; }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .mini-dropzone { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-primary); border: 1px dashed var(--border-color); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-secondary); flex-grow: 1; transition: all 0.3s ease; }
    .mini-dropzone.visible { display: flex; }
    .mini-dropzone.active { border-color: var(--accent); background: #f0f0f0; }
    .mini-dropzone svg { width: 16px; height: 16px; flex-shrink: 0; }
    .file-name { font-weight: 500; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* === MODAL FORM STYLES === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(248, 249, 250, 0.8); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
      opacity: 0; visibility: hidden; transition: opacity 0.3s;
    }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    
    .modal-form-container {
      background: var(--bg-card); border-radius: 16px; width: 600px; max-height: 90vh;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column;
      transform: scale(0.95); transition: transform 0.3s;
    }
    .modal-overlay.visible .modal-form-container { transform: scale(1); }
    
    .form-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .form-title { font-size: 18px; font-weight: 700; }
    .form-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 24px; line-height: 1; }
    
    .form-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    
    .form-section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
    .form-divider { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .input-group { position: relative; width: 100%; }
    .input-field {
      width: 100%; padding: 14px 16px; font-size: 14px; border: 1px solid var(--border-color);
      border-radius: 10px; background: var(--bg-primary); color: var(--text-primary);
      outline: none; transition: border-color 0.2s, background 0.2s; font-family: 'SN Pro', sans-serif;
    }
    .input-field:focus { border-color: var(--accent); background: var(--bg-card); }
    .input-label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); pointer-events: none; transition: all 0.2s; background: transparent; padding: 0 4px; }
    .input-field:focus + .input-label, .input-field:not(:placeholder-shown) + .input-label { top: 0; font-size: 11px; color: var(--accent); background: var(--bg-card); font-weight: 500; }
    /* Date fix */
    input[type="date"] + .input-label, input[type="date"]:focus + .input-label { top: 0; font-size: 11px; color: var(--text-muted); background: var(--bg-card); transform: translateY(0); }

    .form-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- HEADER -->
  <header class="m1-header">
    <div class="m1-header-title">Страница 1</div>
    <!-- Main Tab Switcher -->
    <div class="tab-container">
      <input type="radio" name="m1Tabs" id="m1-tab1" class="m1-tab-input" checked>
      <label for="m1-tab1" class="m1-tab-label">Подстраница 1</label>
      <input type="radio" name="m1Tabs" id="m1-tab2" class="m1-tab-input">
      <label for="m1-tab2" class="m1-tab-label">Подстраница 2</label>
      <div class="indicator"></div>
    </div>
  </header>

  <!-- SUBPAGE 1 (MANAGER) -->
  <div class="m1-page active" id="page1">
    <div class="m1-top-section">
      <button class="m1-action-btn" id="openCreateTaskBtn">
        <span class="material-symbols-outlined" style="font-size: 18px;">add</span>
        Создать задание
      </button>
    </div>
    <div class="m1-bottom-section">
      <div class="modal9-scroll-wrapper">
        <div class="modal9-window">
          <div class="modal9-content">
            <div id="managerOrdersList" class="orders-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SUBPAGE 2 (AUTHOR) -->
  <div class="m1-page" id="page2">
    <div class="m1-top-section">
       <!-- Author can have a button or title here, leaving empty or title based on context -->
       <h3 style="font-size: 16px; font-weight: 600;">Доступные задания</h3>
    </div>
    <div class="m1-bottom-section">
      <div class="modal9-scroll-wrapper">
        <div class="modal9-window">
          <div class="modal9-content">
            
            <!-- Author Inner Tabs -->
            <div class="view-header">
              <div class="tab-container">
                <input type="radio" name="authorTabs" id="authorTabNew" class="m1-tab-input tab--new" checked>
                <label for="authorTabNew" class="m1-tab-label">Новые задания</label>
                <input type="radio" name="authorTabs" id="authorTabMy" class="m1-tab-input tab--my">
                <label for="authorTabMy" class="m1-tab-label">Мои задания</label>
                <div class="indicator"></div>
              </div>
            </div>
            
            <div id="authorOrdersList" class="orders-list"></div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CREATE TASK MODAL -->
  <div class="modal-overlay" id="createTaskModal">
    <div class="modal-form-container" onclick="event.stopPropagation()">
      <div class="form-header">
        <div class="form-title">Создание заданий</div>
        <button class="form-close" onclick="closeTaskModal()">&times;</button>
      </div>
      <div class="form-body" id="taskFormBody">
        <!-- Content injected by JS -->
      </div>
      <div class="form-footer" id="taskFormFooter">
         <!-- Footer injected by JS -->
      </div>
    </div>
  </div>

<script>
(function() {
    // === FIX LAYOUT HEIGHT ===
    const parentContainer = document.getElementById('pageContent');
    if (parentContainer) { parentContainer.style.height = '100%'; parentContainer.style.overflow = 'hidden'; }

    const sb = window.supabaseClient;
    const user = window.currentUser;

    // Elements
    const tab1 = document.getElementById('m1-tab1');
    const tab2 = document.getElementById('m1-tab2');
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const managerList = document.getElementById('managerOrdersList');
    const authorList = document.getElementById('authorOrdersList');
    const createModal = document.getElementById('createTaskModal');
    const openCreateBtn = document.getElementById('openCreateTaskBtn');
    
    // Author Tabs
    const authorTabNew = document.getElementById('authorTabNew');
    const authorTabMy = document.getElementById('authorTabMy');
    let currentAuthorView = 'new';

    // Temp Data
    let tempFiles = {};
    let uploadedFiles = [];
    let sources = [];
    let sourceIdCounter = 0;

    // === TAB LOGIC ===
    tab1.addEventListener('change', () => { page1.classList.add('active'); page2.classList.remove('active'); });
    tab2.addEventListener('change', () => { page1.classList.remove('active'); page2.classList.add('active'); loadAuthorData(); }); // Load data when switching to author
    
    authorTabNew.addEventListener('change', () => { currentAuthorView = 'new'; loadAuthorData(); });
    authorTabMy.addEventListener('change', () => { currentAuthorView = 'my'; loadAuthorData(); });

    // === CREATE TASK MODAL LOGIC ===
    openCreateBtn.addEventListener('click', () => { createModal.classList.add('visible'); resetTaskForm(); renderTaskForm(); });
    createModal.addEventListener('click', (e) => { if(e.target === createModal) createModal.classList.remove('visible'); });

    function closeTaskModal() { createModal.classList.remove('visible'); }
    
    function resetTaskForm() {
        uploadedFiles = [];
        sources = [];
        sourceIdCounter = 0;
        sources.push({ id: ++sourceIdCounter, platform: '', count: 0, link: '' });
    }

    function renderTaskForm() {
        const body = document.getElementById('taskFormBody');
        const footer = document.getElementById('taskFormFooter');
        
        const filesHtml = uploadedFiles.map((f, i) => `<div class="file-item"><span>${f.name}</span><span onclick="removeUploadFile(${i})" style="cursor:pointer;color:var(--error);margin-left:8px;">×</span></div>`).join('');

        const sourcesHtml = sources.map(s => `
            <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
                <input type="text" placeholder="Площадка" value="${s.platform}" onchange="updateSource(${s.id}, 'platform', this.value)" style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:6px;">
                <input type="number" placeholder="Кол-во" value="${s.count || ''}" onchange="updateSource(${s.id}, 'count', this.value)" style="width:60px; padding:8px; border:1px solid var(--border-color); border-radius:6px;">
                <input type="text" placeholder="Ссылка" value="${s.link}" onchange="updateSource(${s.id}, 'link', this.value)" style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:6px;">
                <button onclick="removeSource(${s.id})" style="background:none; border:none; color:var(--error); cursor:pointer; font-size:18px;">×</button>
            </div>
        `).join('');

        body.innerHTML = `
            <div style="display:flex; gap:16px; height:150px;">
                <div style="flex:1; border:2px dashed var(--border-color); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('fileInputTask').click()">
                    <span class="material-symbols-outlined" style="font-size:32px; color:var(--text-muted);">cloud_upload</span>
                    <span style="font-size:12px; color:var(--text-muted); margin-top:8px;">Перетащите файлы</span>
                    <input type="file" id="fileInputTask" multiple style="display:none" onchange="handleTaskFiles(this.files)">
                </div>
                <div style="flex:1; border:1px solid var(--border-color); border-radius:10px; padding:10px; overflow-y:auto; background:white;">
                    <div style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">Файлы</div>
                    ${filesHtml}
                </div>
            </div>
            
            <div class="form-grid">
                <div class="input-group"><input type="text" id="taskClientName" placeholder=" "><label class="input-label">Наименование клиента</label></div>
                <div class="input-group"><input type="text" id="taskClientInn" placeholder=" "><label class="input-label">ИНН клиента</label></div>
            </div>
            <div class="form-grid">
                <div class="input-group"><input type="date" id="taskStartDate"><label class="input-label">Дата начала</label></div>
                <div class="input-group"><input type="date" id="taskEndDate"><label class="input-label">Дата завершения</label></div>
            </div>

            <div style="background:var(--bg-primary); padding:12px; border-radius:8px;">
                ${sourcesHtml}
                <button onclick="addSource()" style="width:100%; margin-top:8px; padding:8px; border:1px dashed var(--border-color); border-radius:6px; cursor:pointer; color:var(--text-secondary); font-size:12px;">+ Добавить площадку</button>
            </div>
        `;

        footer.innerHTML = `
            <button class="btn-cancel" onclick="closeTaskModal()">Отмена</button>
            <button class="btn-submit" id="submitTaskBtn" onclick="submitTask()">
                <span class="btn-text">Создать</span>
                <div class="loader"></div>
            </button>
        `;
    }

    // Global handlers for Task Form
    window.handleTaskFiles = (files) => { Array.from(files).forEach(f => uploadedFiles.push(f)); renderTaskForm(); };
    window.removeUploadFile = (idx) => { uploadedFiles.splice(idx, 1); renderTaskForm(); };
    window.addSource = () => { sources.push({ id: ++sourceIdCounter, platform: '', count: 0, link: '' }); renderTaskForm(); };
    window.removeSource = (id) => { sources = sources.filter(s => s.id !== id); renderTaskForm(); };
    window.updateSource = (id, field, val) => { const s = sources.find(x => x.id === id); if(s) s[field] = val; renderTaskForm(); };

    async function submitTask() {
        const btn = document.getElementById('submitTaskBtn');
        btn.classList.add('loading');

        const clientName = document.getElementById('taskClientName').value;
        const clientInn = document.getElementById('taskClientInn').value;
        const startDate = document.getElementById('taskStartDate').value;
        const endDate = document.getElementById('taskEndDate').value;

        if(!clientName || !clientInn || !startDate || !endDate) { alert('Заполните поля'); btn.classList.remove('loading'); return; }
        if(sources.length === 0 || sources.every(s => !s.count)) { alert('Добавьте площадки'); btn.classList.remove('loading'); return; }

        try {
            let lastNum = await getLastNum('order_number', 'reviews_order');
            let lastGroup = await getLastNum('order_number_general', 'reviews_order');
            
            const docs = uploadedFiles.map(f => ({name: f.name, size: f.size}));
            
            for(const src of sources) {
                const count = parseInt(src.count) || 0;
                if(count === 0) continue;
                
                // Increment group number ONCE per group creation
                lastGroup = incrementGroup(lastGroup);

                const batch = [];
                for(let i=0; i<count; i++) {
                    lastNum = incrementOrder(lastNum);
                    batch.push({
                        manager_login: user.login,
                        manager_name: `${user.first_name} ${user.last_name}`,
                        manager_phone: user.phone,
                        order_number: lastNum,
                        order_number_general: lastGroup,
                        client_name: clientName,
                        client_inn: clientInn,
                        start_date: startDate,
                        end_date: endDate,
                        platform: src.platform,
                        link: src.link,
                        documents: docs,
                        status: 'создана'
                    });
                }
                const {error} = await sb.from('reviews_order').insert(batch);
                if(error) throw error;
            }

            alert('Задания созданы!');
            closeTaskModal();
            loadManagerData();
        } catch(e) {
            console.error(e);
            alert('Ошибка: ' + e.message);
        } finally {
            btn.classList.remove('loading');
        }
    }

    function incrementOrder(curr) {
        let l = curr.substring(0,2);
        let d = parseInt(curr.substring(3));
        d++;
        if(d>99999) { d=1; l = incL(l); }
        return `${l}-${String(d).padStart(5,'0')}`;
    }
    function incL(str) { let a=str.split(''); let i=a.length-1; while(i>=0){ if(a[i]==='Z'){a[i]='A';i--;}else{a[i]=String.fromCharCode(a[i].charCodeAt(0)+1);return a.join('');} } return 'AA'; }
    function incrementGroup(curr) {
        if(!curr || !curr.startsWith('group-')) return 'group-A00001';
        let c = curr.replace('group-','');
        let l = c.substring(0,1);
        let n = parseInt(c.substring(1));
        n++;
        if(n>99999) { n=1; l = String.fromCharCode(l.charCodeAt(0)+1); }
        return `group-${l}${String(n).padStart(5,'0')}`;
    }
    async function getLastNum(col, table) {
        const {data} = await sb.from(table).select(col).order(col, {ascending:false}).limit(1).maybeSingle();
        return data ? data[col] : (col === 'order_number' ? 'AA-00000' : 'group-A00000');
    }

    // === SUBPAGE 1 (MANAGER) DATA LOADING ===
    async function loadManagerData() {
        managerList.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Загрузка...</div>';
        try {
            // Fetch Client View
            const { data: clients, error: e1 } = await sb.from('reviews_order_client').select('*');
            if(e1) throw e1;

            // Fetch Autor View
            const { data: autors, error: e2 } = await sb.from('reviews_order_autor').select('*');
            if(e2) throw e2;

            const map = {};
            autors.forEach(a => {
                if(!map[a.order_number_general]) map[a.order_number_general] = [];
                map[a.order_number_general].push(a);
            });

            if(!clients || clients.length === 0) {
                managerList.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Нет созданных заказов</div>';
                return;
            }

            managerList.innerHTML = clients.map(c => {
                const items = map[c.order_number_general] || [];
                const aut = items[0] || {};
                const plats = items.map(a => `
                    <div class="platform-item">
                        <div class="platform-name">${a.platform || '-'}</div>
                        <div class="platform-stats">
                            <div class="stat-item">Создана: <span class="stat-count">${a.count_created||0}</span></div>
                            <div class="stat-item">В работе: <span class="stat-count">${a.count_in_progress||0}</span></div>
                            <div class="stat-item">Проверка: <span class="stat-count">${a.count_review||0}</span></div>
                            <div class="stat-item">Завершено: <span class="stat-count">${a.count_completed||0}</span></div>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="order-card">
                        <div class="card-header">
                            <div class="client-info">
                                <div class="client-org"><span>Организация:</span> ${c.client_name || '-'}</div>
                                <div class="client-inn"><span>ИНН:</span> ${c.client_inn || '-'}</div>
                            </div>
                            <div class="order-number-badge">${c.order_number_general}</div>
                        </div>
                        <div class="card-row">
                            <span class="row-label">данные менеджера сделки</span>
                            <span class="row-value">${aut.manager_name || '-'} | ${aut.manager_phone || '-'}</span>
                        </div>
                        <div class="card-row">
                            <span class="row-label">дата начала</span>
                            <span class="row-value" style="margin-right:24px;">${formatDate(c.start_date)}</span>
                            <span class="row-label">дата завершения</span>
                            <span class="row-value">${formatDate(c.end_date)}</span>
                        </div>
                        <div class="platforms-container">
                            ${plats}
                        </div>
                    </div>
                `;
            }).join('');

        } catch(e) {
            console.error(e);
            managerList.innerHTML = `<div style="color:var(--error); padding:20px;">Ошибка загрузки данных. Проверьте existence of views (reviews_order_client).<br><small>${e.message}</small></div>`;
        }
    }

    // === SUBPAGE 2 (AUTHOR) DATA LOADING ===
    async function loadAuthorData() {
        authorList.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Загрузка...</div>';
        
        try {
            if(currentAuthorView === 'new') {
                // New Tasks Logic
                const { data: candidates } = await sb.from('reviews_order_autor_exercise').select('*').eq('status', 'создана');
                const { data: busy } = await sb.from('reviews_order').select('order_number_general, platform').neq('status', 'создана');
                const busyKeys = new Set(busy.map(r => `${r.order_number_general}::${r.platform}`));
                const avail = candidates.filter(c => !busyKeys.has(`${c.order_number_general}::${c.platform}`));
                renderAuthorCards(avail, 'new');
            } else {
                // My Tasks Logic
                const { data } = await sb.from('reviews_order').select('*').eq('autor_phone', user.phone).in('status', ['в работе', 'на проверке']);
                renderAuthorCards(data, 'my');
            }
        } catch(e) {
            console.error(e);
            authorList.innerHTML = `<div style="color:var(--error); padding:20px;">Ошибка: ${e.message}</div>`;
        }
    }

    function renderAuthorCards(items, type) {
        if(!items || items.length === 0) {
            authorList.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding:20px;">${type === 'new' ? 'Нет доступных заданий' : 'Нет ваших заданий'}</div>`;
            return;
        }

        authorList.innerHTML = items.map(item => {
            const key = `${item.order_number_general}-${(item.platform||'').replace(/[^a-zA-Z0-9]/g,'-')}`;
            const statClass = item.status === 'в работе' ? 'status-progress' : (item.status === 'на проверке' ? 'status-review' : '');
            
            let action = '';
            if(type === 'new') {
                action = `<button class="action-btn primary" onclick="takeWork('${item.order_number_general}', '${item.platform}')">Взять в работу</button>`;
            } else {
                if(item.status === 'в работе') {
                    const hasFile = tempFiles[key];
                    const dz = hasFile ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span class="file-name">${hasFile.name}</span>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><span>Фото</span>`;
                    action = `
                        <div class="mini-dropzone visible" onclick="document.getElementById('inp-${key}').click()" ondragover="event.preventDefault();this.classList.add('active')" ondragleave="this.classList.remove('active')" ondrop="dropAuthFile(event, '${key}')">${dz}<input type="file" accept="image/*" id="inp-${key}" style="display:none" onchange="authFile(event, '${key}')"></div>
                        <button class="action-btn secondary" onclick="submitAuth('${key}')" ${hasFile ? '' : 'disabled'}>На проверку</button>
                    `;
                } else {
                    action = `<div style="width:100%; text-align:center; color:var(--warning); font-weight:600;">Ожидает проверки</div>`;
                }
            }

            return `
                <div class="order-card" id="auth-card-${key}">
                    <div class="card-header">
                        <div class="client-info">
                            <div style="font-size:12px; color:var(--text-muted);">Платформа: <b style="color:var(--text-primary);">${item.platform}</b></div>
                            <div style="font-size:12px; color:var(--text-muted);">Группа: <b style="color:var(--text-primary);">${item.order_number_general}</b></div>
                        </div>
                        <div class="order-number-badge ${statClass}">${item.status || 'статус'}</div>
                    </div>
                    <div class="card-row">
                        <span class="row-label">Менеджер:</span>
                        <span class="row-value">${item.manager_name || '-'} (${item.manager_phone || '-'})</span>
                    </div>
                    <div class="card-row">
                        <span class="row-label">Сроки:</span>
                        <span class="row-value">${formatDate(item.start_date)} — ${formatDate(item.end_date)}</span>
                    </div>
                    <div class="card-row">
                        <span class="row-label">Ссылка:</span>
                        <span class="row-value"><a href="${item.link}" target="_blank">Перейти</a></span>
                    </div>
                    <div class="action-block">${action}</div>
                </div>
            `;
        }).join('');
    }

    // Author Actions
    window.takeWork = async (grp, plat) => {
        const {data: row} = await sb.from('reviews_order').select('id').eq('order_number_general', grp).eq('platform', plat).eq('status', 'создана').limit(1).maybeSingle();
        if(!row) { alert('Задание недоступно'); loadAuthorData(); return; }
        
        const upd = { status: 'в работе', autor_name: `${user.first_name} ${user.last_name}`, autor_phone: user.phone, autor_task: new Date().toISOString() };
        await sb.from('reviews_order').update(upd).eq('id', row.id);
        loadAuthorData();
    };

    window.authFile = (e, key) => { if(e.target.files[0]) { tempFiles[key] = e.target.files[0]; loadAuthorData(); } };
    window.dropAuthFile = (e, key) => { e.preventDefault(); e.currentTarget.classList.remove('active'); if(e.dataTransfer.files[0]) { tempFiles[key] = e.dataTransfer.files[0]; loadAuthorData(); } };
    
    window.submitAuth = async (key) => {
        if(!tempFiles[key]) { alert('Загрузите фото'); return; }
        const [grp, plat] = key.split('-'); // Reconstructing might be tricky, better pass args again or parse ID. Let's assume data-attrs needed but for simplicity re-fetch
        
        // We need group and platform to find the record. Let's parse the card ID: auth-card-group-A00001-Ozon-ru
        const card = document.getElementById(`auth-card-${key}`);
        const grpText = card.querySelector('.client-info div:nth-child(2) b').textContent; // group-A00001
        const platText = card.querySelector('.client-info div:nth-child(1) b').textContent; // Ozon.ru
        
        const {data: row} = await sb.from('reviews_order').select('id').eq('order_number_general', grpText).eq('platform', platText).eq('status', 'в работе').maybeSingle();
        if(!row) { alert('Ошибка'); return; }
        await sb.from('reviews_order').update({status: 'на проверке'}).eq('id', row.id);
        loadAuthorData();
    };

    // === HELPERS ===
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('ru-RU') : '-'; }

    // === INIT ===
    loadManagerData();

})();
</script>
</div>
