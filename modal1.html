<!-- modal1.html -->
<!DOCTYPE html>
<div class="m1-root">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <style>
    /* === ПАЛИТРА === */
    :root {
      --bg-primary: #f8f9fa;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --accent: #000000;
      --accent-hover: #333333;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    .m1-root {
      display: flex; flex-direction: column; height: 100%; width: 100%;
      position: relative; background: var(--bg-card); font-family: 'SN Pro', sans-serif; overflow: hidden;
    }

    /* === ШАПКА СТРАНИЦЫ (ТАБЫ) === */
    .m1-header { display: flex; justify-content: space-between; align-items: center; height: 56px; min-height: 56px; border-bottom: 1px solid var(--border-color); padding: 0 20px; background: var(--bg-card); z-index: 10; }
    .m1-header-title { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; color: var(--text-primary); text-transform: uppercase; }
    
    .radio-inputs { position: relative; display: flex; flex-wrap: wrap; border-radius: 10px; background-color: var(--bg-primary); box-sizing: border-box; box-shadow: 0 0 0px 1px rgba(0, 0, 0, 0.06); padding: 4px; font-size: 14px; }
    .radio-inputs .radio { flex: 1 1 auto; text-align: center; }
    .radio-inputs .radio input { display: none; }
    .radio-inputs .radio .name { display: flex; cursor: pointer; align-items: center; justify-content: center; border-radius: 8px; border: none; padding: 8px 16px; color: var(--text-secondary); transition: all 0.15s ease-in-out; font-weight: 500; }
    .radio-inputs .radio input:checked + .name { background-color: var(--bg-card); font-weight: 600; color: var(--text-primary); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); animation: select 0.3s ease; }
    .radio-inputs .radio:hover .name { background-color: rgba(255, 255, 255, 0.5); }
    @keyframes select { 0% { transform: scale(0.95); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .radio-inputs .radio input:checked + .name::before, .radio-inputs .radio input:checked + .name::after { content: ""; position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0; animation: particles 0.5s ease forwards; }
    .radio-inputs .radio input:checked + .name::before { top: -6px; left: 50%; transform: translateX(-50%); }
    .radio-inputs .radio input:checked + .name::after { bottom: -6px; left: 50%; transform: translateX(-50%); }
    @keyframes particles { 0% { opacity: 0; transform: translateX(-50%) translateY(0); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(var(--direction)); } }
    .radio-inputs .radio input:checked + .name::before { --direction: -10px; }
    .radio-inputs .radio input:checked + .name::after { --direction: 10px; }

    .m1-page { display: none; flex-direction: column; flex: 1; height: calc(100% - 56px); position: relative; }
    .m1-page.active { display: flex; }

    /* === ВЕРХНЯЯ ЧАСТЬ === */
    .m1-top-section { height: 100px; min-height: 100px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-color); background: var(--bg-card); }
    
    .glass-btn { padding: 12px 24px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 14px; font-weight: 600; font-family: 'SN Pro', sans-serif; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; position: relative; overflow: hidden; }
    .glass-btn:hover { transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15); background: rgba(0, 0, 0, 0.9); }
    .glass-btn:active { transform: scale(0.98); }
    .glass-btn .icon { width: 20px; height: 20px; transition: transform 0.3s ease; }
    .glass-btn:hover .icon { transform: rotate(12deg); }
    .glass-btn .loader { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .glass-btn.loading .btn-text { visibility: hidden; }
    .glass-btn.loading .loader { display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* === НИЖНЯЯ ЧАСТЬ (СКРОЛЛ) === */
    .m1-bottom-section { flex: 1; position: relative; }
    .modal9-scroll-wrapper { position: absolute; top: 0; left: 0; bottom: 0; width: calc(100% + 30px); overflow: visible; pointer-events: auto; z-index: 1; }
    .modal9-window { height: 100%; width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.6); padding: 20px; padding-right: 10px; }
    .modal9-content { height: 100%; width: 100%; overflow-y: scroll; overflow-x: hidden; padding-right: 20px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
    .modal9-content::-webkit-scrollbar { width: 6px; }
    .modal9-content::-webkit-scrollbar-track { background: transparent; }
    .modal9-content::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 10px; }

    /* === КАРТОЧКИ СДЕЛОК (NEW LAYOUT) === */
    .deals-list { display: flex; flex-direction: column; gap: 20px; width: 100%; padding-bottom: 20px; }
    
    .deal-card {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px;
      padding: 20px; display: flex; flex-direction: column; gap: 16px; width: 100%; box-sizing: border-box;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: box-shadow 0.3s ease;
    }
    .deal-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); }
    
    /* Header New Layout */
    .deal-header {
      display: flex; align-items: flex-start; justify-content: flex-start; gap: 20px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
      position: relative; /* For absolute positioning of sum */
    }

    .h-block {
      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }

    .h-row {
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    }

    .h-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; white-space: nowrap; text-align: left; }
    .h-value { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
    
    /* Fixed Widths */
    .block-1 { width: 220px; }
    .block-2 { width: 260px; }
    .block-3 { width: 200px; }
    
    /* Block 1 Specifics */
    .deal-id-badge {
      display: inline-block; padding: 2px 8px; background: var(--bg-primary); border-radius: 4px;
      font-size: 12px; font-weight: 700; color: var(--text-primary);
      border: 1px solid var(--border-color); text-align: left; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    }

    /* Block 4 (Sum) - Absolute positioning top right */
    .block-sum {
      position: absolute; top: 0; right: 0;
      text-align: right; width: auto;
    }
    .sum-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    /* Body: 3 Columns */
    .deal-body-row { display: flex; gap: 16px; height: 100px; }

    .doc-block {
      flex: 1; border: 1px solid var(--border-color); border-radius: 8px;
      display: flex; flex-direction: column; position: relative; overflow: hidden; background: var(--bg-primary);
    }
    .doc-block.double { flex: 2; }

    .doc-header {
      padding: 8px 12px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); background: white; border-bottom: 1px solid var(--border-color);
      text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
    }

    .doc-content { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }

    .file-item {
      font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between;
      background: white; padding: 4px 6px; border-radius: 4px; gap: 6px;
    }
    .file-item-left { display: flex; align-items: center; gap: 6px; overflow: hidden; cursor: pointer; flex: 1; }
    .file-item-left:hover { color: var(--accent); }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .file-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 2px; line-height: 1; }
    .file-btn:hover { color: var(--accent); }
    .file-btn.delete:hover { color: var(--error); }

    .upload-btn-abs {
      position: absolute; bottom: 8px; right: 8px;
      padding: 4px 10px; font-size: 11px; font-weight: 600;
      background: var(--accent); color: white; border-radius: 6px; border: none; cursor: pointer;
      z-index: 2; transition: opacity 0.2s;
    }
    .upload-btn-abs:hover { background: var(--accent-hover); }

    /* History Block */
    .history-header-row { display: grid; grid-template-columns: 1fr 0.8fr 0.8fr 1.2fr; padding: 6px 10px; font-size: 11px; font-weight: 600; color: var(--text-muted); background: white; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .history-body { flex: 1; overflow-y: auto; padding: 4px; font-size: 12px; }
    .history-row { display: grid; grid-template-columns: 1fr 0.8fr 0.8fr 1.2fr; padding: 4px 6px; border-bottom: 1px solid #f0f0f0; }
    .history-row:last-child { border-bottom: none; }

    /* Footer */
    .deal-footer { margin-top: auto; padding-top: 12px; border-top: 1px dashed var(--border-color); font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }

    /* === МОДАЛЬНОЕ ОКНО === */
    .modal-overlay { position: fixed; inset: 0; background: rgba(248, 249, 250, 0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; visibility: visible; }
    .modal-form-container { background: var(--bg-card); border-radius: 16px; width: 600px; max-height: 90vh; box-shadow: 0 20px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; transform: scale(0.95); transition: transform 0.3s; }
    .modal-overlay.visible .modal-form-container { transform: scale(1); }
    .form-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .form-title { font-size: 18px; font-weight: 700; }
    .form-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 24px; line-height: 1; }
    .form-body { padding: 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 24px; }
    .form-section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
    .form-divider { border-bottom: 1px solid var(--border-color); padding-bottom: 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .input-group { position: relative; width: 100%; }
    .input-field { width: 100%; padding: 14px 16px; font-size: 14px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-primary); color: var(--text-primary); outline: none; transition: border-color 0.2s, background 0.2s; font-family: 'SN Pro', sans-serif; }
    .input-field:focus { border-color: var(--accent); background: var(--bg-card); }
    .input-label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); pointer-events: none; transition: all 0.2s; background: transparent; padding: 0 4px; }
    .input-field:focus + .input-label, .input-field:not(:placeholder-shown) + .input-label { top: 0; font-size: 11px; color: var(--accent); background: var(--bg-card); font-weight: 500; }
    .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; margin-top: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
    .autocomplete-dropdown.visible { display: block; }
    .autocomplete-item { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--bg-primary); }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--bg-primary); }
    .form-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; }
    .btn-cancel { padding: 10px 20px; background: transparent; border: 1px solid var(--border-color); border-radius: 10px; font-weight: 600; cursor: pointer; }
    .btn-submit { padding: 10px 20px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; min-width: 140px; justify-content: center; font-family: 'SN Pro', sans-serif; font-size: 14px; }
    .btn-submit:hover { transform: scale(1.02); background: rgba(0, 0, 0, 0.9); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-submit .loader { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .btn-submit.loading .btn-text { visibility: hidden; }
    .btn-submit.loading .loader { display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  </style>

  <!-- ШАПКА -->
  <header class="m1-header">
    <div class="m1-header-title">Страница 1</div>
    <div class="radio-inputs">
      <label class="radio">
        <input type="radio" name="m1Tabs" id="m1-tab1" checked />
        <span class="name">Подстраница 1</span>
      </label>
      <label class="radio">
        <input type="radio" name="m1Tabs" id="m1-tab2" />
        <span class="name">Подстраница 2</span>
      </label>
    </div>
  </header>

  <!-- ПОДСТРАНИЦА 1 -->
  <div class="m1-page active" id="page1">
    <div class="m1-top-section">
      <button class="glass-btn" id="openDealModalBtn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span class="btn-text">Кнопка подстраницы 1</span>
      </button>
    </div>
    <div class="m1-bottom-section">
      <div class="modal9-scroll-wrapper">
        <div class="modal9-window">
          <div class="modal9-content">
            <div class="deals-list" id="dealsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ПОДСТРАНИЦА 2 -->
  <div class="m1-page" id="page2">
    <div class="m1-top-section">
      <button class="glass-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span class="btn-text">Кнопка подстраницы 2</span>
      </button>
    </div>
    <div class="m1-bottom-section">
      <div class="modal9-scroll-wrapper">
        <div class="modal9-window">
          <div class="modal9-content">
            <p style="color: var(--text-muted); padding: 20px;">Контент подстраницы 2...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ СДЕЛКИ -->
  <div class="modal-overlay" id="dealModalOverlay">
    <div class="modal-form-container">
      <div class="form-header">
        <div class="form-title">Создание новой сделки</div>
        <button class="form-close" id="closeDealModalBtn">&times;</button>
      </div>
      <div class="form-body">
        <div class="form-divider">
          <div class="form-section-title">Данные контрагента</div>
          <div class="form-grid">
            <div class="input-group" style="position:relative;">
              <input type="text" class="input-field" id="dealINN" placeholder=" " autocomplete="off">
              <label class="input-label">ИНН</label>
              <div class="autocomplete-dropdown" id="innDropdown"></div>
            </div>
            <div class="input-group">
              <input type="text" class="input-field" id="dealOPF" placeholder=" ">
              <label class="input-label">ОПФ (ИП, ООО...)</label>
            </div>
            <div class="input-group" style="grid-column: span 2;">
              <input type="text" class="input-field" id="dealCompany" placeholder=" ">
              <label class="input-label">Наименование организации</label>
            </div>
          </div>
        </div>

        <div class="form-divider">
          <div class="form-section-title">Данные клиента</div>
          <div class="form-grid">
            <div class="input-group" style="grid-column: span 2; position:relative;">
              <input type="text" class="input-field" id="dealLastName" placeholder=" " autocomplete="off">
              <label class="input-label">Фамилия</label>
              <div class="autocomplete-dropdown" id="clientDropdown"></div>
            </div>
            <div class="input-group">
              <input type="text" class="input-field" id="dealFirstName" placeholder=" ">
              <label class="input-label">Имя</label>
            </div>
            <div class="input-group">
              <input type="text" class="input-field" id="dealMiddleName" placeholder=" ">
              <label class="input-label">Отчество</label>
            </div>
            <div class="input-group">
              <input type="text" class="input-field" id="dealPhone" placeholder=" ">
              <label class="input-label">Телефон</label>
            </div>
            <div class="input-group">
              <input type="email" class="input-field" id="dealEmail" placeholder=" ">
              <label class="input-label">Email</label>
            </div>
          </div>
        </div>

        <div>
          <div class="form-section-title">Данные договора</div>
          <div class="form-grid">
            <div class="input-group">
              <input type="text" class="input-field" id="dealContractNum" placeholder=" ">
              <label class="input-label">Номер договора</label>
            </div>
            <div class="input-group">
              <input type="date" class="input-field" id="dealContractDate" placeholder=" " style="padding-top: 16px;">
              <label class="input-label" style="top: 0; background: var(--bg-card); padding: 0 4px; font-size: 11px; font-weight: 500;">Дата договора</label>
            </div>
            <div class="input-group" style="grid-column: span 2;">
              <input type="number" class="input-field" id="dealSum" placeholder=" ">
              <label class="input-label">Сумма договора</label>
            </div>
            <div class="input-group" style="grid-column: span 2;">
              <textarea class="input-field" id="dealHelp" rows="2" placeholder=" " style="padding-top: 20px; min-height: auto;"></textarea>
              <label class="input-label">Комментарий (Помощь)</label>
            </div>
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn-cancel" id="cancelDealBtn">Отмена</button>
        <button class="btn-submit" id="submitDealBtn">
          <span class="btn-text">Создать сделку</span>
          <div class="loader"></div>
        </button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const parentContainer = document.getElementById('pageContent');
    if (parentContainer) { parentContainer.style.height = '100%'; parentContainer.style.overflow = 'hidden'; }

    if (!window.supabaseClient) { console.error('Supabase client not found!'); return; }
    const sb = window.supabaseClient;

    const tab1 = document.getElementById('m1-tab1');
    const tab2 = document.getElementById('m1-tab2');
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const modalOverlay = document.getElementById('dealModalOverlay');
    const openBtn = document.getElementById('openDealModalBtn');
    const closeBtn = document.getElementById('closeDealModalBtn');
    const cancelBtn = document.getElementById('cancelDealBtn');
    const submitBtn = document.getElementById('submitDealBtn');
    const container = document.getElementById('dealsList');

    const fields = {
      inn: document.getElementById('dealINN'), opf: document.getElementById('dealOPF'), company: document.getElementById('dealCompany'),
      lname: document.getElementById('dealLastName'), fname: document.getElementById('dealFirstName'), mname: document.getElementById('dealMiddleName'),
      phone: document.getElementById('dealPhone'), email: document.getElementById('dealEmail'),
      contractNum: document.getElementById('dealContractNum'), contractDate: document.getElementById('dealContractDate'),
      sum: document.getElementById('dealSum'), help: document.getElementById('dealHelp')
    };

    tab1.addEventListener('change', () => { page1.classList.add('active'); page2.classList.remove('active'); });
    tab2.addEventListener('change', () => { page1.classList.remove('active'); page2.classList.add('active'); });

    function toggleModal(show) { if (show) { modalOverlay.classList.add('visible'); resetForm(); } else { modalOverlay.classList.remove('visible'); } }
    openBtn.addEventListener('click', () => toggleModal(true));
    closeBtn.addEventListener('click', () => toggleModal(false));
    cancelBtn.addEventListener('click', () => toggleModal(false));
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) toggleModal(false); });
    function resetForm() { Object.values(fields).forEach(el => el.value = ''); submitBtn.classList.remove('loading'); }

    // Autocomplete Logic
    let innTimeout; const innDropdown = document.getElementById('innDropdown');
    fields.inn.addEventListener('input', (e) => {
      clearTimeout(innTimeout); const val = e.target.value; if (val.length < 2) { innDropdown.classList.remove('visible'); return; }
      innTimeout = setTimeout(async () => {
        const { data } = await sb.from('reviews_counterparty').select('*').ilike('inn', `%${val}%`).limit(5);
        if (data && data.length > 0) { innDropdown.innerHTML = data.map(c => `<div class="autocomplete-item" data-inn="${c.inn}" data-opf="${c.opf}" data-name="${c.name_company}"><strong>${c.inn}</strong> <small style="margin-left:5px; color:#888;">${c.name_company || ''}</small></div>`).join(''); innDropdown.classList.add('visible'); } else { innDropdown.classList.remove('visible'); }
      }, 300);
    });
    innDropdown.addEventListener('click', (e) => { const item = e.target.closest('.autocomplete-item'); if (item) { fields.inn.value = item.dataset.inn; fields.opf.value = item.dataset.opf; fields.company.value = item.dataset.name; innDropdown.classList.remove('visible'); } });

    let clientTimeout; const clientDropdown = document.getElementById('clientDropdown');
    fields.lname.addEventListener('input', (e) => {
      clearTimeout(clientTimeout); const val = e.target.value; if (val.length < 2) { clientDropdown.classList.remove('visible'); return; }
      clientTimeout = setTimeout(async () => {
        const { data } = await sb.from('reviews_human_contact').select('*').ilike('last_name', `%${val}%`).limit(5);
        if (data && data.length > 0) { clientDropdown.innerHTML = data.map(c => `<div class="autocomplete-item" data-fname="${c.first_name}" data-lname="${c.last_name}" data-mname="${c.middle_name}" data-phone="${c.phone}" data-email="${c.email}">${c.last_name} ${c.first_name} ${c.middle_name} <small>${c.phone || ''}</small></div>`).join(''); clientDropdown.classList.add('visible'); } else { clientDropdown.classList.remove('visible'); }
      }, 300);
    });
    clientDropdown.addEventListener('click', (e) => { const item = e.target.closest('.autocomplete-item'); if (item) { fields.lname.value = item.dataset.lname; fields.fname.value = item.dataset.fname; fields.mname.value = item.dataset.mname; fields.phone.value = item.dataset.phone; fields.email.value = item.dataset.email; clientDropdown.classList.remove('visible'); } });

    document.addEventListener('click', (e) => { if (!e.target.closest('#dealINN') && !e.target.closest('#innDropdown')) innDropdown.classList.remove('visible'); if (!e.target.closest('#dealLastName') && !e.target.closest('#clientDropdown')) clientDropdown.classList.remove('visible'); });

    // Submit Creation
    submitBtn.addEventListener('click', async () => {
      submitBtn.classList.add('loading'); submitBtn.disabled = true;
      try {
        const lname = fields.lname.value.trim(); const fname = fields.fname.value.trim(); const mname = fields.mname.value.trim(); let client_id = null;
        if (lname && fname) {
          let { data: existingContact } = await sb.from('reviews_human_contact').select('id').eq('last_name', lname).eq('first_name', fname).eq('middle_name', mname).maybeSingle();
          if (existingContact) { client_id = existingContact.id; await sb.from('reviews_human_contact').update({ phone: fields.phone.value.trim(), email: fields.email.value.trim() }).eq('id', client_id); }
          else { const { data: newContact, error: contactErr } = await sb.from('reviews_human_contact').insert([{ last_name: lname, first_name: fname, middle_name: mname, phone: fields.phone.value.trim(), email: fields.email.value.trim() }]).select('id').single(); if (contactErr) throw contactErr; client_id = newContact.id; }
        }
        const innVal = fields.inn.value.trim(); if (!innVal) throw new Error("ИНН обязателен");
        let { data: existingComp } = await sb.from('reviews_counterparty').select('inn').eq('inn', innVal).maybeSingle();
        if (!existingComp) { await sb.from('reviews_counterparty').insert([{ inn: innVal, opf: fields.opf.value.trim(), name_company: fields.company.value.trim() }]); }
        const dealData = {
          user_id: window.currentUser.id, contract_number: fields.contractNum.value.trim(), contract_date: fields.contractDate.value || null, sum_deal: parseFloat(fields.sum.value) || 0,
          inn: innVal, opf: fields.opf.value.trim(), name_company: fields.company.value.trim(), client_id: client_id,
          last_name: lname, first_name: fname, middle_name: mname, phone: fields.phone.value.trim(), email: fields.email.value.trim(), help_text: fields.help.value.trim()
        };
        const { error: dealErr } = await sb.from('reviews_list_deals').insert([dealData]); if (dealErr) throw dealErr;
        toggleModal(false); await loadDeals();
      } catch (err) { alert("Ошибка создания: " + err.message); console.error(err); } finally { submitBtn.classList.remove('loading'); submitBtn.disabled = false; }
    });

    // Helper: Format Date
    function formatCustomDate(isoString) {
        if (!isoString) return '-';
        const date = new Date(isoString);
        const months = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];
        const d = date.getDate().toString().padStart(2, '0'); const m = months[date.getMonth()]; const y = date.getFullYear();
        const time = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        return `${d} ${m} ${y} г. ( ${time} )`;
    }

    // Helper: File Upload (Multiple)
    window.handleDealFileUpload = async function(dealId, type, inputElement) {
        const files = inputElement.files;
        if (!files || files.length === 0) return;

        const column = type === 'agreement' ? 'documents_agreement' : 'documents_closing';
        
        try {
            // 1. Fetch current list
            const { data: currentDeal } = await sb.from('reviews_list_deals').select(column).eq('id', dealId).single();
            let docs = currentDeal[column] || [];
            let newDocs = [];

            // 2. Upload each file
            for (const file of files) {
                const filePath = `${dealId}/${type}/${Date.now()}_${file.name}`;
                const { error: uploadError } = await sb.storage.from('deals-documents').upload(filePath, file);
                if (uploadError) throw new Error(`Ошибка загрузки ${file.name}: ${uploadError.message}`);

                const { data: urlData } = sb.storage.from('deals-documents').getPublicUrl(filePath);
                newDocs.push({ name: file.name, url: urlData.publicUrl, path: filePath });
            }

            // 3. Update DB
            docs = [...docs, ...newDocs];
            const { error: updateError } = await sb.from('reviews_list_deals').update({ [column]: docs }).eq('id', dealId);
            if (updateError) throw updateError;

            await loadDeals(); // Refresh
        } catch (err) {
            console.error(err);
            alert('Ошибка загрузки: ' + err.message);
        }
    };

    // Helper: File Delete
    window.deleteFile = async function(dealId, type, path, event) {
        event.stopPropagation(); // Prevent opening file
        if(!confirm('Удалить файл?')) return;

        const column = type === 'agreement' ? 'documents_agreement' : 'documents_closing';
        try {
            // 1. Delete from Storage
            const { error: storageError } = await sb.storage.from('deals-documents').remove([path]);
            if (storageError) throw storageError;

            // 2. Update DB
            const { data: currentDeal } = await sb.from('reviews_list_deals').select(column).eq('id', dealId).single();
            let docs = currentDeal[column] || [];
            docs = docs.filter(d => d.path !== path);

            const { error: updateError } = await sb.from('reviews_list_deals').update({ [column]: docs }).eq('id', dealId);
            if (updateError) throw updateError;

            await loadDeals();
        } catch (err) {
            console.error(err);
            alert('Ошибка удаления: ' + err.message);
        }
    };

    // Helper: File Rename
    window.renameFile = async function(dealId, type, oldPath, event) {
        event.stopPropagation();
        const newName = prompt('Введите новое имя файла:', oldPath.split('/').pop());
        if (!newName) return;

        const column = type === 'agreement' ? 'documents_agreement' : 'documents_closing';

        try {
            // 1. Update DB Name (Simpler approach)
            const { data: currentDeal } = await sb.from('reviews_list_deals').select(column).eq('id', dealId).single();
            let docs = currentDeal[column] || [];
            
            const docIndex = docs.findIndex(d => d.path === oldPath);
            if (docIndex === -1) throw new Error("File not found in DB");
            
            // Construct new path
            const pathParts = oldPath.split('/');
            pathParts[pathParts.length-1] = newName;
            const newPath = pathParts.join('/');

            // 2. Move file in Storage
            const { data, error: moveError } = await sb.storage.from('deals-documents').move(oldPath, newPath);
            if (moveError) throw moveError;

            // 3. Update metadata in DB
            docs[docIndex].name = newName;
            docs[docIndex].path = newPath;
            // Update URL if public URL changes (usually it does based on path)
            const { data: urlData } = sb.storage.from('deals-documents').getPublicUrl(newPath);
            docs[docIndex].url = urlData.publicUrl;

            const { error: updateError } = await sb.from('reviews_list_deals').update({ [column]: docs }).eq('id', dealId);
            if (updateError) throw updateError;

            await loadDeals();
        } catch (err) {
            console.error(err);
            alert('Ошибка переименования: ' + err.message);
        }
    };

    // Load Deals
    async function loadDeals() {
      if (!container) return; container.innerHTML = '<div style="color:var(--text-muted); padding: 20px;">Загрузка сделок...</div>';
      try {
        const { data, error } = await sb.from('reviews_list_deals').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        if (!data || data.length === 0) { container.innerHTML = '<div style="color:var(--text-muted); padding: 20px; text-align:center;">Нет созданных сделок</div>'; return; }
        
        container.innerHTML = data.map(deal => {
          const fio = `${deal.last_name || ''} ${deal.first_name || ''} ${deal.middle_name || ''}`.trim();
          const sumFormatted = new Intl.NumberFormat('ru-RU').format(deal.sum_deal || 0);
          const contractStr = `№ ${deal.contract_number || '-'} от ${deal.contract_date ? new Date(deal.contract_date).toLocaleDateString('ru-RU') : '-'}`;
          
          // Render file lists with Rename/Delete buttons
          const renderFiles = (docs, type) => (docs && docs.length > 0) 
            ? docs.map(d => `
                <div class="file-item">
                    <div class="file-item-left" onclick="window.open('${d.url}', '_blank')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        <span class="file-name">${d.name}</span>
                    </div>
                    <div class="file-actions">
                        <button class="file-btn rename" onclick="renameFile('${deal.id}', '${type}', '${d.path}', event)" title="Переименовать">✎</button>
                        <button class="file-btn delete" onclick="deleteFile('${deal.id}', '${type}', '${d.path}', event)" title="Удалить">✕</button>
                    </div>
                </div>
            `).join('')
            : '<div style="font-size:11px; color:var(--text-muted); padding:4px;">Нет файлов</div>';

          return `
            <div class="deal-card" id="deal-${deal.id}">
              <div class="deal-header">
                <!-- Block 1: ID & Contract -->
                <div class="h-block block-1">
                    <div class="h-row">
                        <span class="h-value"><span class="deal-id-badge">${deal.id}</span></span>
                        <span class="h-label"></span>
                    </div>
                    <div class="h-row">
                        <span class="h-label">Договор</span>
                        <span class="h-value muted" style="font-size: 13px;">${contractStr}</span>
                    </div>
                </div>
                
                <!-- Block 2: Org & INN -->
                <div class="h-block block-2" style="margin-top: 10px;">
                    <div class="h-row">
                        <span class="h-label">Организация</span>
                        <span class="h-value">${deal.opf || ''} ${deal.name_company || '-'}</span>
                    </div>
                    <div class="h-row">
                        <span class="h-label">ИНН</span>
                        <span class="h-value muted">${deal.inn || '-'}</span>
                    </div>
                </div>
                
                <!-- Block 3: Client & Phone -->
                <div class="h-block block-3 style="margin-top: 10px;"">
                    <div class="h-row">
                        <span class="h-label">Клиент</span>
                        <span class="h-value">${fio || '-'}</span>
                    </div>
                    <div class="h-row">
                        <span class="h-label">Телефон</span>
                        <span class="h-value muted">${deal.phone || '-'}</span>
                    </div>
                </div>

                <!-- Block 4: Sum (Absolute Right) -->
                <div class="block-sum">
                    <div class="sum-value">${sumFormatted} ₽</div>
                </div>
              </div>

              <div class="deal-body-row">
                 <!-- Docs 1 -->
                 <div class="doc-block">
                    <div class="doc-header">Документы соглашения сделки</div>
                    <div class="doc-content">${renderFiles(deal.documents_agreement, 'agreement')}</div>
                    <button class="upload-btn-abs" onclick="document.getElementById('file-agr-${deal.id}').click()">Загрузить</button>
                    <input type="file" multiple id="file-agr-${deal.id}" style="display:none" onchange="handleDealFileUpload('${deal.id}', 'agreement', this)">
                 </div>
                 
                 <!-- Docs 2 -->
                 <div class="doc-block">
                    <div class="doc-header">Документы закрытия сделки</div>
                    <div class="doc-content">${renderFiles(deal.documents_closing, 'closing')}</div>
                    <button class="upload-btn-abs" onclick="document.getElementById('file-close-${deal.id}').click()">Загрузить</button>
                    <input type="file" multiple id="file-close-${deal.id}" style="display:none" onchange="handleDealFileUpload('${deal.id}', 'closing', this)">
                 </div>
                 
                 <!-- History -->
                 <div class="doc-block double">
                    <div class="history-header-row"><span>ФИО</span><span>Роль</span><span>Дата</span><span>Описание действия</span></div>
                    <div class="history-body"><div style="color:var(--text-muted); font-size:11px; padding:10px;">История пуста</div></div>
                 </div>
              </div>

              <div class="deal-footer">
                <span>Создано: ${formatCustomDate(deal.created_at)}</span>
                <span>Изменено: ${formatCustomDate(deal.updated_at || deal.created_at)}</span>
              </div>
            </div>`;
        }).join('');
      } catch (err) { console.error(err); container.innerHTML = '<div style="color:red; padding: 20px;">Ошибка загрузки данных.</div>'; }
    }
    loadDeals();
  })();
  </script>
</div>
